<!DOCTYPE html>
<html lang="de">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                
                <a href="https://thionbas.github.io/schilder" class="menu-card">

                    </div>
