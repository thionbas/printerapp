<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRINTER APP - Hauptmenü</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 text-gray-900 font-sans min-h-screen">

    <header class="bg-[#064e3b] p-5 shadow-md">

            <h1 class="text-3xl font-black text-white tracking-widest uppercase">AP PRINTER HUB</h1>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-6 mt-10">
        
        <section class="bg-white p-10 rounded-lg shadow-xl border border-gray-200">
            
            <h2 class="text-3xl font-black text-center border-b-2 pb-4 mb-10 uppercase text-gray-700 tracking-widest">
                Was möchten Sie drucken?
            </h2>
            
            <div class="grid grid-cols-2 md:grid-cols-3 gap-8">
                
                <a href="https://thionbas.github.io/schilder" class="menu-card">
                    <img src="IMG_4554.png" alt="Schilder" class="menu-icon">
                    <span class="menu-label">Schilder</span>
                </a>

                <a href="https://thionbas.github.io/kanister" class="menu-card">
                    <img src="IMG_4555.png" alt="Kanister" class="menu-icon">
                    <span class="menu-label">Kanister</span>
                </a>

                <a href="https://thionbas.github.io/behaelter" class="menu-card">
                    <img src="IMG_4553.png" alt="Behälter" class="menu-icon">
                    <span class="menu-label">Behälter</span>
                </a>

                <a href="https://thionbas.github.io/probegross" class="menu-card">
                    <img src="IMG_4552.png" alt="Probe Groß" class="menu-icon">
                    <span class="menu-label">Probe Groß</span>
                </a>

                <a href="https://thionbas.github.io/probeklein" class="menu-card">
                    <img src="IMG_4557.png" alt="Probe Klein" class="menu-icon">
                    <span class="menu-label">Probe Klein</span>
                </a>

                <a href="https://thionbas.github.io/hobbock" class="menu-card">
                    <img src="IMG_4556.png" alt="Hobbock" class="menu-icon">
                    <span class="menu-label">Hobbock</span>
                </a>

            </div>
        </section>
    </main>

</body>
</html>
